<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Music History Mapper</title>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .ui-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1;
            background: rgba(15, 15, 15, 0.92); padding: 20px; border-radius: 12px;
            width: 320px; border: 1px solid #333; backdrop-filter: blur(10px);
            max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        input[type="text"] { 
            background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);
        }
        
        button { 
            background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; 
            cursor: pointer; font-weight: bold; transition: all 0.2s; 
        }
        button:hover { border-color: #00ffcc; background: #2a2a2a; }
        button.active { background: #00ffcc !important; color: #000 !important; border-color: #00ffcc; }
        
        #year-display { font-size: 32px; font-weight: 900; color: #00ffcc; margin-bottom: 5px; }
        .slider { width: 100%; accent-color: #00ffcc; cursor: pointer; }
        
        .stats-panel {
            margin-top: 5px; padding: 15px; background: rgba(0, 255, 204, 0.03); 
            border: 1px solid #222; border-radius: 8px; font-size: 12px;
        }
        .stats-title { color: #00ffcc; font-weight: bold; margin-bottom: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; color: #999; }
        .stat-val { color: #eee; font-weight: 600; text-align: right; }

        .pan-btn {
            margin-top: 10px; width: 100%; padding: 6px; font-size: 10px; 
            background: transparent; border: 1px dashed #444; color: #00ffcc;
            display: none; 
        }

        .toggle-group { display: flex; gap: 4px; background: #1a1a1a; padding: 4px; border-radius: 8px; }
        .toggle-group button { flex: 1; padding: 6px; font-size: 11px; border: none; }

        #debug-log { font-size: 10px; color: #555; margin-top: 12px; font-family: monospace; }

        /* Pop-ups restored styling */
        .maplibregl-popup-content { background: #111; color: #fff; border: 1px solid #00ffcc; border-radius: 8px; padding: 15px; }
        .popup-location { font-size: 10px; text-transform: uppercase; color: #00ffcc; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 8px; font-weight: bold; }
        .popup-artist { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 4px; }
        .mb-link { display: inline-block; margin-top: 12px; color: #00ffcc; text-decoration: none; font-size: 10px; border: 1px solid #333; padding: 5px 10px; border-radius: 4px; }
        .popup-nav { margin-top: 12px; padding-top: 10px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: #222; color: white; border: 1px solid #444; padding: 2px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div id="year-display">1970</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
    
    <div class="controls">
        <input type="text" id="genre-search" placeholder="Search Genre...">
        
        <div style="display:flex; justify-content: space-between; align-items: center; font-size: 13px; color: #bbb;">
            <label style="cursor:pointer;"><input type="checkbox" id="cumulative-toggle" checked> Cumulative</label>
            <input type="range" id="speed-slider" min="30" max="400" value="200" style="width: 60px;" dir="rtl">
        </div>

        <button id="play-btn">▶ Play Timeline</button>

        <div class="toggle-group">
            <button id="btn-points" class="active">Point Map</button>
            <button id="btn-heatmap">Heatmap</button>
        </div>
        
        <div class="stats-panel">
            <div class="stats-title" id="stats-title">Global Discovery Stats</div>
            <div class="stat-row"><span>Records in View:</span> <span id="stat-total" class="stat-val">0</span></div>
            <div class="stat-row"><span>First Appearance:</span> <span id="stat-first-year" class="stat-val">-</span></div>
            <div class="stat-row"><span>Primary Hub:</span> <span id="stat-mode-loc" class="stat-val">-</span></div>
            <button id="pan-to-origin" class="pan-btn">⌖ Pan to Origin</button>
        </div>

        <div id="debug-log">Status: Initializing...</div>
    </div>
</div>

<script>
/** --- RESTORED GLOBALS --- **/
let currentYear = 1970; 
let isPlaying = false;
let genreDict = {}, musicMetadata = {}, locationLookup = [], genreStats = {};
let searchTimeout, activePopup = null;

// The missing variables that broke the pop-ups:
let popupFeatures = [];
let currentPopupIndex = 0;
let mbidLookup = null;
const MBID_URL = "https://www.mvoltz.com/music-map/data/mbid_lookup.json";

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const PMTILES_URL = "https://www.mvoltz.com/music-map/data/music_data.pmtiles"; 
const DICT_URL = "https://www.mvoltz.com/music-map/data/genre_dictionary.json";
const META_URL = "https://www.mvoltz.com/music-map/data/metadata_lookup.json";
const LOC_URL = "https://www.mvoltz.com/music-map/data/location_lookup.json";
const STATS_URL = "https://www.mvoltz.com/music-map/data/genre_stats.json";

async function loadAssets() {
    try {
        logStatus("Fetching Metadata...");
        const [dictRes, metaRes, locRes, statsRes] = await Promise.all([
            fetch(DICT_URL), fetch(META_URL), fetch(LOC_URL), fetch(STATS_URL)
        ]);
        genreDict = await dictRes.json();
        musicMetadata = await metaRes.json();
        locationLookup = await locRes.json();
        genreStats = await statsRes.json();
        logStatus("Ready.");
        updateStats(); 
    } catch (err) { logStatus("Error loading assets."); }
}

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [15, 20],
    zoom: 2.2,
    pitch: 0,           // Strict 2D
    bearing: 0,         
    dragRotate: false,  
    touchPitch: false   
});

map.on('load', async () => {
    await loadAssets();
    map.addSource('music-points', { type: 'vector', url: `pmtiles://${PMTILES_URL}` });

    map.addLayer({
        'id': 'music-heat', 'type': 'heatmap', 'source': 'music-points', 'source-layer': 'music',
        'layout': { 'visibility': 'none' },
        'paint': {
            'heatmap-weight': 1,
            'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 0, 1, 9, 3],
            'heatmap-color': ['interpolate', ['linear'], ['heatmap-density'], 0, 'rgba(0,0,0,0)', 0.2, 'rgba(0, 255, 204, 0.2)', 0.4, 'rgba(0, 255, 204, 0.5)', 0.6, 'rgba(255, 255, 0, 0.7)', 0.8, 'rgba(255, 100, 0, 0.8)', 1, 'rgba(255, 0, 0, 0.9)'],
            'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 0, 5, 5, 15, 10, 40], 
            'heatmap-opacity': 0.8
        }
    });

    map.addLayer({
        'id': 'music-layer', 'type': 'circle', 'source': 'music-points', 'source-layer': 'music',
        'paint': {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2, 10, 8],
            'circle-color': '#00ffcc', 'circle-stroke-width': 1, 'circle-stroke-color': '#fff', 'circle-opacity': 0.7
        }
    });

    // Cursors restored for BOTH layers
    map.on('mouseenter', 'music-layer', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'music-layer', () => map.getCanvas().style.cursor = '');
    map.on('mouseenter', 'music-heat', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'music-heat', () => map.getCanvas().style.cursor = '');

    // Map-wide click listener to handle both Heatmap and Points
    map.on('click', (e) => {
        const activeLayer = map.getLayoutProperty('music-heat', 'visibility') === 'visible' ? 'music-heat' : 'music-layer';
        popupFeatures = map.queryRenderedFeatures(e.point, { layers: [activeLayer] });
        currentPopupIndex = 0;
        
        if (popupFeatures.length > 0) {
            showPopup(e.lngLat);
        }
    });

    initControls();
    updateFilters();
});

/** --- POPUP LOGIC --- **/
async function showPopup(lngLat) {
    if (activePopup) activePopup.remove();
    if (!popupFeatures || popupFeatures.length === 0) return;

    const feat = popupFeatures[currentPopupIndex];
    const muId = feat.properties.mu_id;
    const details = musicMetadata[muId];
    if (!details) return;

    // Fetch MBID lookup if we don't have it yet
    if (!mbidLookup) {
        try { 
            const res = await fetch(MBID_URL); 
            mbidLookup = await res.json(); 
        } catch (e) {
            console.error("Failed to load MusicBrainz IDs", e);
        }
    }

    const mbid = mbidLookup ? mbidLookup[muId] : null;
    const mbHTML = mbid ? `<a href="https://musicbrainz.org/release-group/${mbid}" target="_blank" class="mb-link">↗ MusicBrainz</a>` : '';
    let navHTML = popupFeatures.length > 1 ? `<div class="popup-nav"><button class="nav-btn" onclick="changePopup(-1)">◂</button><span style="font-size:10px; color:#888;">${currentPopupIndex + 1}/${popupFeatures.length}</span><button class="nav-btn" onclick="changePopup(1)">▸</button></div>` : '';

    const html = `<div class="popup-location">${locationLookup[details[2]] || 'Unknown'}</div><div class="popup-artist">${details[0]}</div><div class="popup-release">${details[1]}</div><div class="popup-year" style="color:#00ffcc; font-weight:bold; margin-top:5px;">${details[4]}</div>${mbHTML}${navHTML}`;

    activePopup = new maplibregl.Popup({ maxWidth: '280px', focusAfterOpen: false, closeButton: false }).setLngLat(lngLat).setHTML(html).addTo(map);
}

window.changePopup = (dir) => {
    currentPopupIndex = (currentPopupIndex + dir + popupFeatures.length) % popupFeatures.length;
    showPopup(activePopup.getLngLat());
};

/** --- FILTERING & UI --- **/
function updateFilters() {
    if (!map.getLayer('music-layer')) return;
    const isCumulative = document.getElementById('cumulative-toggle').checked;
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    
    const yearFilter = isCumulative ? ['<=', ['get', 'release_year'], currentYear] : ['==', ['get', 'release_year'], currentYear];
    let finalFilter = yearFilter; 

    if (searchTerm) {
        let matchingIds = [];
        for (const [genre, id] of Object.entries(genreDict)) {
            if (genre.includes(searchTerm)) matchingIds.push(id);
        }
        if (matchingIds.length > 0) {
            let genreConditions = matchingIds.map(id => ['in', `|${id}|`, ['get', 'genre_ids']]);
            finalFilter = ['all', yearFilter, ['any', ...genreConditions]];
        } else {
            finalFilter = ['==', ['get', 'release_year'], -1]; 
        }
    }

    map.setFilter('music-layer', finalFilter);
    map.setFilter('music-heat', finalFilter);
    document.getElementById('year-display').innerText = currentYear;
    updateStats(); 
}

function updateStats() {
    if (!musicMetadata) return;
    const isCumulative = document.getElementById('cumulative-toggle').checked;
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    const panBtn = document.getElementById('pan-to-origin');
    
    const spotlight = genreStats[searchTerm] || genreStats['#' + searchTerm];
    if (searchTerm && spotlight) {
        document.getElementById('stats-title').innerText = `${searchTerm.toUpperCase()} SPOTLIGHT`;
        document.getElementById('stat-first-year').innerText = spotlight.first_year;
        panBtn.style.display = 'block';
    } else {
        document.getElementById('stats-title').innerText = "GLOBAL DISCOVERY STATS";
        document.getElementById('stat-first-year').innerText = "-";
        panBtn.style.display = 'none';
    }

    let total = 0, locCounts = {}, maxLocCount = 0, modeLocId = -1, firstFound = Infinity;
    let targetGenreIds = new Set();
    if (searchTerm) {
        for (const [name, id] of Object.entries(genreDict)) { if (name.includes(searchTerm)) targetGenreIds.add(id); }
    }

    for (const id in musicMetadata) {
        const item = musicMetadata[id];
        if (isCumulative ? (item[4] > currentYear) : (item[4] !== currentYear)) continue;
        if (searchTerm && !item[3].some(gid => targetGenreIds.has(gid))) continue;
        total++;
        if (item[4] < firstFound) firstFound = item[4];
        const locId = item[2];
        locCounts[locId] = (locCounts[locId] || 0) + 1;
        if (locCounts[locId] > maxLocCount) { maxLocCount = locCounts[locId]; modeLocId = locId; }
    }

    document.getElementById('stat-total').innerText = total.toLocaleString();
    if (document.getElementById('stat-first-year').innerText === "-") {
        document.getElementById('stat-first-year').innerText = firstFound === Infinity ? "-" : firstFound;
    }
    const modeName = modeLocId !== -1 ? locationLookup[modeLocId]?.split(',')[0] : "-";
    document.getElementById('stat-mode-loc').innerText = maxLocCount > 0 ? `${modeName} (${maxLocCount})` : "-";
}

function initControls() {
    document.getElementById('year-slider').addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateFilters();
    });

    document.getElementById('genre-search').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(updateFilters, 300);
    });

    document.getElementById('pan-to-origin').onclick = () => {
        const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
        const spotlight = genreStats[searchTerm] || genreStats['#' + searchTerm];
        if (spotlight) {
            map.flyTo({ center: spotlight.origin, zoom: 5, essential: true });
            currentYear = spotlight.first_year;
            document.getElementById('year-slider').value = currentYear;
            updateFilters();
        }
    };

    document.getElementById('cumulative-toggle').addEventListener('change', updateFilters);
    document.getElementById('play-btn').onclick = function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "⏸ Pause Timeline" : "▶ Play Timeline";
        if (isPlaying) animate();
    };

    document.getElementById('btn-points').onclick = () => {
        map.setLayoutProperty('music-layer', 'visibility', 'visible');
        map.setLayoutProperty('music-heat', 'visibility', 'none');
        document.getElementById('btn-points').classList.add('active');
        document.getElementById('btn-heatmap').classList.remove('active');
    };

    document.getElementById('btn-heatmap').onclick = () => {
        map.setLayoutProperty('music-layer', 'visibility', 'none');
        map.setLayoutProperty('music-heat', 'visibility', 'visible');
        document.getElementById('btn-heatmap').classList.add('active');
        document.getElementById('btn-points').classList.remove('active');
    };
}

function animate() {
    if (!isPlaying) return;
    currentYear++;
    if (currentYear > 2025) { currentYear = 1890; isPlaying = false; document.getElementById('play-btn').innerText = "▶ Play Timeline"; }
    document.getElementById('year-slider').value = currentYear;
    updateFilters();
    setTimeout(animate, parseInt(document.getElementById('speed-slider').value));
}

function logStatus(msg) { document.getElementById('debug-log').innerText = `Status: ${msg}`; }
</script>
</body>
</html>
