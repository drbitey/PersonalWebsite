<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Music History Mapper</title>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #111; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1;
            background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 8px;
            width: 300px; border: 1px solid #444;
        }
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        input, button { background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; }
        #year-display { font-size: 24px; font-weight: bold; color: #00ffcc; }
        .slider { width: 100%; accent-color: #00ffcc; }
        /* Style for a small debug overlay if needed */
        #debug-log { font-size: 10px; color: #aaa; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-panel">
    <h2>Music History</h2>
    <div id="year-display">1890</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1890">
    <div class="controls">
        <input type="text" id="genre-search" placeholder="Search Genre...">
        <label><input type="checkbox" id="cumulative-toggle"> Cumulative View</label>
        <button id="play-btn">▶ Play Timeline</button>
        <div id="debug-log">Status: Initializing...</div>
    </div>
</div>

<script>
// --- SUPER DIAGNOSTICS ---
async function runPowerDiagnostics(url) {
    console.log("--- Starting Power Diagnostics ---");
    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Range': 'bytes=0-1024' }
        });

        console.log("Response Status:", response.status);
        console.log("Accept-Ranges:", response.headers.get("Accept-Ranges"));
        console.log("Content-Type:", response.headers.get("Content-Type"));
        console.log("Access-Control-Allow-Origin:", response.headers.get("Access-Control-Allow-Origin"));

        if (response.status !== 206) {
            logStatus("CRITICAL: Server returned 200 instead of 206. PMTiles requires Range support.");
        } else {
            logStatus("Server supports Range Requests. Checking file internal structure...");
        }

        const p = new pmtiles.PMTiles(url);
        const metadata = await p.getMetadata();
        logStatus(`Success! Found layers: ${metadata.vector_layers.map(l => l.id).join(', ')}`);
        
    } catch (err) {
        logStatus(`Network Error: ${err.message}`);
        console.error("Full Error Object:", err);
    }
}

function logStatus(msg) {
    console.log(`[MAP_DEBUG] ${msg}`);
    const debugEl = document.getElementById('debug-log');
    if (debugEl) debugEl.innerText = `Status: ${msg}`;
}

// --- CORE MAP LOGIC ---
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", (request) => {
    // This logs every single tile request MapLibre makes
    console.log(`Requesting Tile: ${request.url}`);
    return protocol.tile(request);
});

// Using a cache-busting parameter to see if it's a caching/CDN issue
const PMTILES_URL = "https://www.mvoltz.com/music-map/data/music_data.pmtiles?v=" + Math.random();

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [0, 20],
    zoom: 2
});

map.on('load', async () => {
    logStatus("Map Style Loaded. Initializing PMTiles...");
    
    // Run the power diagnostics
    runPowerDiagnostics(PMTILES_URL);

    map.addSource('music-points', {
        type: 'vector',
        url: `pmtiles://${PMTILES_URL}`
    });

    map.addLayer({
        'id': 'music-layer',
        'type': 'circle',
        'source': 'music-points',
        'source-layer': 'music_vector_master', // MUST match the 'Found layers' diagnostic output
        'paint': {
            'circle-radius': 4,
            'circle-color': '#00ffcc',
            'circle-stroke-width': 1,
            'circle-stroke-color': '#fff'
        }
    });

    // Update filter immediately for initial view
    updateFilters();
    initControls();
});

// ... (keep your updateFilters, initControls, and animate functions from before)
function updateFilters() {
    const isCumulative = document.getElementById('cumulative-toggle').checked;
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    
    const yearValue = ['to-number', ['get', 'year']];
    let yearFilter = isCumulative 
        ? ['<=', yearValue, currentYear] 
        : ['==', yearValue, currentYear];

    let finalFilter = yearFilter;

    if (searchTerm) {
        finalFilter = [
            'all', 
            yearFilter, 
            ['in', searchTerm, ['downcase', ['to-string', ['coalesce', ['get', 'genre'], '']]]]
        ];
    }

    if (map.getLayer('music-layer')) {
        map.setFilter('music-layer', finalFilter);
    }
    document.getElementById('year-display').innerText = currentYear;
}

function initControls() {
    const slider = document.getElementById('year-slider');
    const playBtn = document.getElementById('play-btn');

    slider.addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateFilters();
    });

    document.getElementById('genre-search').addEventListener('input', updateFilters);
    document.getElementById('cumulative-toggle').addEventListener('change', updateFilters);

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? "Pause" : "Play Timeline";
        if (isPlaying) animate();
    });
}

function animate() {
    if (!isPlaying) return;
    currentYear++;
    if (currentYear > 2025) currentYear = 1890;
    document.getElementById('year-slider').value = currentYear;
    updateFilters();
    setTimeout(animate, 200);
}
</script>
</body>
</html>
