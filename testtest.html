<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Genre Diffusion Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #0f0f12; transition: opacity 0.2s; }
        
        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 25, 0.9);
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 1;
        }
        input[type=range] { width: 100%; cursor: pointer; }
        input[type=text] { width: 100%; padding: 8px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 10px; }
        .credit { font-size: 10px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="map-overlay">
    <h2 style="margin-top:0;">Music Diffusion</h2>
    
    <label>Search Genre:</label>
    <input id="genre-search" type="text" placeholder="e.g. jazz, metal, electronic...">

    <label>Year: <span id="year-label">1980</span></label>
    <input id="slider" type="range" min="1890" max="2025" step="1" value="1980">
    
    <div class="credit">Data: MusicBrainz (CC BY-NC-SA 3.0)</div>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [0, 20],
        zoom: 2
    });

    let currentDecade = null;
    let activeGenre = "";
    let searchTimeout;

    // --- 1. FILTER LOGIC ---
    function updateMapFilters() {
        if (!map.getLayer('music-heat')) return;

        const year = parseInt(document.getElementById('slider').value);
        
        // 1. Base filter: Year check
        let filters = ['all', ['<=', ['get', 'release_year'], year]];

        // 2. Genre search with a safety "coalesce" to prevent the "number instead of string" crash
        if (activeGenre) {
            filters.push([
                'in', 
                activeGenre.toLowerCase(), 
                ['coalesce', ['get', 'release_genres'], ''] // If genre is null/number, use ''
            ]);
        }

        map.setFilter('music-heat', filters);
    }

    // --- 2. DATA LOADING (FLICKER-FREE) ---
    function loadDecadeData(decade) {
        const filePath = `data_chunks/music_${decade}s.csv`;
        
        // Visual cue that new data is fetching
        document.getElementById('map').style.opacity = '0.7';

        Papa.parse(filePath, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                const features = results.data
                    .filter(row => row.lat && row.lon)
                    .map(row => ({
                        'type': 'Feature',
                        'geometry': { 'type': 'Point', 'coordinates': [row.lon, row.lat] },
                        'properties': { ...row }
                    }));

                const geojson = { 'type': 'FeatureCollection', 'features': features };

                if (map.getSource('music-data')) {
                    // This 'once' listener ensures the filter applies the moment the new decade lands
                    map.once('sourcedata', (e) => {
                        if (e.sourceId === 'music-data' && e.isSourceLoaded) {
                            updateMapFilters();
                            document.getElementById('map').style.opacity = '1';
                        }
                    });
                    map.getSource('music-data').setData(geojson);
                } else {
                    map.addSource('music-data', { 'type': 'geojson', 'data': geojson });
                    addHeatmapLayer();
                    document.getElementById('map').style.opacity = '1';
                }
            }
        });
    }

    // --- 3. LAYER DEFINITION ---
    function addHeatmapLayer() {
        if (map.getLayer('music-heat')) return;

        map.addLayer({
            'id': 'music-heat',
            'type': 'heatmap',
            'source': 'music-data',
            'paint': {
                'heatmap-weight': 0.1,
                'heatmap-intensity': 4,
                'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 0, 2, 9, 15],
                'heatmap-color': [
                    'interpolate', ['linear'], ['heatmap-density'],
                    0, 'rgba(0,0,0,0)',
                    0.2, '#4d004b',
                    0.4, '#810f7c',
                    0.6, '#ba478f', 
                    0.8, '#df65b0',
                    1, '#f7fcfd'
                ]
            }
        });
    }

    // --- 4. EVENT LISTENERS ---
    map.on('load', () => {
        currentDecade = 1980;
        loadDecadeData(currentDecade);

        const slider = document.getElementById('slider');
        const yearLabel = document.getElementById('year-label');
        const searchInput = document.getElementById('genre-search');

        // Year Slider with Decade-Check
        slider.addEventListener('input', (e) => {
            const year = parseInt(e.target.value);
            const decade = Math.floor(year / 10) * 10;
            yearLabel.textContent = year;

            if (decade !== currentDecade) {
                currentDecade = decade;
                loadDecadeData(decade);
            } else {
                updateMapFilters();
            }
        });

        // Debounced Genre Search
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                activeGenre = e.target.value.trim().toLowerCase();
                updateMapFilters();
                console.log(`Filtering for: ${activeGenre}`);
            }, 300);
        });
    });
</script>
</body>
</html>
