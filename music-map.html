<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Music History Mapper</title>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

    <link rel="stylesheet" href="music-map/style.css">
</head>
<body>

<div id="map"></div>
<div class="ui-panel">
    <div id="year-display">1970</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
    
    <div class="controls">
        <div style="position: relative;">
            <input type="text" id="artist-search" placeholder="Search Artist (e.g. Chat Pile)..." style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);">
            <div id="artist-results" style="display:none; position: absolute; top: 48px; left: 0; right: 0; background: #0f0f0f; border: 1px solid #333; z-index: 100; max-height: 250px; overflow-y: auto; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            </div>
        </div>
        <input type="text" id="genre-search" placeholder="Search Genre..." style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);">
        <button id="play-btn">▶ Play Timeline</button>
        <div class="toggle-group" style="display: flex; gap: 4px; background: #1a1a1a; padding: 4px; border-radius: 8px;">
            <button id="btn-points" class="active" style="flex:1;">Points</button>
            <button id="btn-heatmap" style="flex:1;">Heatmap</button>
        </div>

        <button id="reset-btn" style="margin-top: 5px; background: rgba(255, 50, 50, 0.1); border-color: #422;">↺ Reset All</button>
        
        <div class="stats-panel">
            <div class="stats-title" id="stats-title">Global Stats</div>
            <div class="stat-row"><span>Records:</span> <span id="stat-total" class="stat-val">0</span></div>
            <div class="stat-row"><span>First Year:</span> <span id="stat-first-year" class="stat-val">-</span></div>
            <button id="pan-to-origin" style="margin-top:10px; width:100%; padding:6px; font-size:10px; background:transparent; border:1px dashed #444; color:#00ffcc; display:none;">⌖ Pan to Origin</button>
        </div>

        <div class="advanced-toggle" id="adv-toggle">Advanced Settings ▾</div>
        <div class="advanced-content" id="adv-content">
            <div style="font-size: 10px; color: #888;">Animation Speed</div>
            <input type="range" id="speed-slider" min="100" max="900" value="750" class="slider">
    
            <div style="font-size: 10px; color: #888;">Heatmap Radius</div>
            <input type="range" id="heat-radius-slider" min="5" max="80" value="20" class="slider">

            <div style="font-size: 10px; color: #888;">Heatmap Intensity</div>
            <input type="range" id="heat-intensity-slider" min="0.01" max="3.01" step="0.05" value="1" class="slider">

            <div style="font-size: 10px; color: #888; margin-top: 5px;">Heatmap Palette</div>
            <select id="heat-color-select" style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; font-size: 11px; width: 100%;">
                <option value="teal">Cyber Teal (Default)</option>
                <option value="inferno">Classic Inferno</option>
                <option value="magma">Electric Magma</option>
                <option value="glacier">Arctic Glacier</option>
            </select>

            <div style="margin-top: 5px; padding-top: 5px; border-top: 1px solid #333;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                    <label style="font-size:11px; color:#bbb;">
                        <input type="checkbox" id="cumulative-toggle" checked> Cumulative
                    </label>
                    <button id="range-mode-btn" style="padding: 2px 8px; font-size: 10px; display: none; background: #1a1a1a;">± Range</button>
                </div>
    
                <div id="buffer-label-container" style="display: none;">
                    <div style="font-size: 10px; color: #888;">Year Buffer: <span id="buffer-prefix">±</span><span id="buffer-display">0</span> years</div>
                    <input type="range" id="buffer-slider" min="0" max="25" value="0" class="slider">
                </div>
            </div>

            <label style="font-size:11px; color:#bbb;"><input type="checkbox" id="loop-toggle" checked> Auto-Repeat</label>
        </div>
        <div id="debug-log" style="font-size:10px; color:#444; margin-top:10px;">Status: Ready</div>
        <div style="font-size:10px; color:#444;">Data provided by MusicBrainz (CC BY-NC-SA 3.0)</div>
    </div>
</div>

<script src="music-map/music-map.js" defer></script>
</body>
</html>
