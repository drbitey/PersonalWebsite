<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Music History Mapper</title>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .ui-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1;
            background: rgba(15, 15, 15, 0.94); padding: 20px; border-radius: 12px;
            width: 320px; border: 1px solid #333; backdrop-filter: blur(12px);
            max-height: 92vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; }
        #year-display { font-size: 34px; font-weight: 900; color: #00ffcc; margin-bottom: 5px; }
        .slider { width: 100%; accent-color: #00ffcc; cursor: pointer; }
        
        button { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        button:hover { border-color: #00ffcc; background: #2a2a2a; }
        button.active { background: #00ffcc !important; color: #000 !important; }

        .stats-panel { margin-top: 5px; padding: 15px; background: rgba(0, 255, 204, 0.03); border: 1px solid #222; border-radius: 8px; font-size: 12px; }
        .stats-title { color: #00ffcc; font-weight: bold; margin-bottom: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 6px; color: #999; }
        .stat-val { color: #eee; font-weight: 600; text-align: right; }

        .advanced-toggle { font-size: 10px; color: #666; text-align: center; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .advanced-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #222; flex-direction: column; gap: 10px; }

        /* POPUP STYLING */
        .maplibregl-popup-content { background: #111; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 0; overflow: hidden; width: 340px; }
        .popup-header { background: #1a1a1a; padding: 8px 15px; border-bottom: 1px solid #333; font-size: 10px; text-transform: uppercase; color: #00ffcc; letter-spacing: 1px; font-weight: 900; }
        .popup-body { display: flex; padding: 15px; gap: 15px; }
        .popup-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .popup-artist { font-size: 16px; font-weight: 900; color: #fff; line-height: 1.1; }
        .popup-release { font-size: 13px; color: #bbb; line-height: 1.2; margin-bottom: 4px; }
        .popup-year { color: #00ffcc; font-weight: bold; font-size: 12px; margin-bottom: 8px; }
        
        /* Art Column & Loader */
        .popup-right-col { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .popup-art-container { width: 100px; height: 100px; background: #1a1a1a; border-radius: 4px; overflow: hidden; border: 1px solid #333; display: flex; align-items: center; justify-content: center; text-align: center; }
        .popup-art { width: 100%; height: 100%; object-fit: cover; display: none; }
        .no-art-text { font-size: 9px; color: #444; padding: 5px; text-transform: uppercase; font-weight: bold; }
        
        /* Spinner */
        .spinner { border: 2px solid rgba(0, 255, 204, 0.1); border-left-color: #00ffcc; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; position: absolute; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tags in Left Column */
        .genre-container { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 10px; }
        .genre-tag { font-size: 9px; background: #1a1a1a; color: #888; padding: 2px 5px; border-radius: 3px; border: 1px solid #333; }
        
        .popup-footer { background: #0a0a0a; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; }
        .mb-link { color: #555; text-decoration: none; font-size: 10px; }
        .mb-link:hover { color: #00ffcc; }
        .nav-btn { padding: 2px 8px; font-size: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui-panel">
    <div id="year-display">1970</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
    
    <div class="controls">
        <input type="text" id="genre-search" placeholder="Search Genre..." style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);">
        <button id="play-btn">▶ Play Timeline</button>
        <div class="toggle-group" style="display: flex; gap: 4px; background: #1a1a1a; padding: 4px; border-radius: 8px;">
            <button id="btn-points" class="active" style="flex:1;">Points</button>
            <button id="btn-heatmap" style="flex:1;">Heatmap</button>
        </div>
        
        <div class="stats-panel">
            <div class="stats-title" id="stats-title">Global Stats</div>
            <div class="stat-row"><span>Records:</span> <span id="stat-total" class="stat-val">0</span></div>
            <div class="stat-row"><span>First Year:</span> <span id="stat-first-year" class="stat-val">-</span></div>
            <button id="pan-to-origin" style="margin-top:10px; width:100%; padding:6px; font-size:10px; background:transparent; border:1px dashed #444; color:#00ffcc; display:none;">⌖ Pan to Origin</button>
        </div>

        <div class="advanced-toggle" id="adv-toggle">Advanced Settings ▾</div>
        <div class="advanced-content" id="adv-content">
            <div style="font-size: 10px; color: #888;">Animation Speed</div>
            <input type="range" id="speed-slider" min="50" max="1000" value="200" class="slider" dir="rtl">
            <div style="font-size: 10px; color: #888;">Heatmap Radius</div>
            <input type="range" id="heat-radius-slider" min="5" max="80" value="20" class="slider">
            <label style="font-size:11px; color:#bbb;"><input type="checkbox" id="loop-toggle" checked> Auto-Repeat</label>
        </div>
        <div id="debug-log" style="font-size:10px; color:#444; margin-top:10px;">Status: Ready</div>
        <div style="font-size:10px; color:#444;">Data provided by MusicBrainz (CC BY-NC-SA 3.0)</div>
    </div>
</div>

<script>
let currentYear = 1970, isPlaying = false, genreDict = {}, idToGenre = {}, musicMetadata = {}, locationLookup = [], genreStats = {}, popupFeatures = [], currentPopupIndex = 0, mbidLookup = null, activePopup = null;

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [15, 20], zoom: 2.2, pitch: 0, bearing: 0, dragRotate: false, touchPitch: false   
});

map.on('load', async () => {
    const [dictRes, metaRes, locRes, statsRes, mbidRes] = await Promise.all([
        fetch("https://www.mvoltz.com/music-map/data/genre_dictionary.json"),
        fetch("https://www.mvoltz.com/music-map/data/metadata_lookup.json"),
        fetch("https://www.mvoltz.com/music-map/data/location_lookup.json"),
        fetch("https://www.mvoltz.com/music-map/data/genre_stats.json"),
        fetch("https://www.mvoltz.com/music-map/data/mbid_lookup.json")
    ]);
    
    genreDict = await dictRes.json(); 
    musicMetadata = await metaRes.json(); 
    locationLookup = await locRes.json(); 
    genreStats = await statsRes.json(); 
    mbidLookup = await mbidRes.json();
    idToGenre = Object.fromEntries(Object.entries(genreDict).map(([name, id]) => [id, name]));

    map.addSource('music-points', { type: 'vector', url: `pmtiles://https://www.mvoltz.com/music-map/data/music_data.pmtiles` });
    map.addLayer({ 'id': 'music-heat', 'type': 'heatmap', 'source': 'music-points', 'source-layer': 'music', 'layout': { 'visibility': 'none' }, 'paint': { 'heatmap-weight': 1, 'heatmap-intensity': 1, 'heatmap-radius': 20, 'heatmap-opacity': 0.8 } });
    map.addLayer({ 'id': 'music-layer', 'type': 'circle', 'source': 'music-points', 'source-layer': 'music', 'paint': { 'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2, 10, 8], 'circle-color': '#00ffcc', 'circle-opacity': 0.7 } });

    map.on('click', (e) => {
        const activeLayer = map.getLayoutProperty('music-heat', 'visibility') === 'visible' ? 'music-heat' : 'music-layer';
        popupFeatures = map.queryRenderedFeatures(e.point, { layers: [activeLayer] });
        currentPopupIndex = 0;
        if (popupFeatures.length > 0) showPopup(e.lngLat);
    });

    initControls();
    updateFilters();
});

async function showPopup(lngLat) {
    if (activePopup) activePopup.remove();
    const feat = popupFeatures[currentPopupIndex];
    const muId = feat.properties.mu_id;
    const d = musicMetadata[muId];
    if (!d) return;

    const genreNames = d[3].map(id => idToGenre[id]).filter(Boolean);
    const genreListHTML = genreNames.map(g => `<span class="genre-tag">${g}</span>`).join('');

    const mbid = mbidLookup ? mbidLookup[muId] : null;
    const artUrl = mbid ? `https://coverartarchive.org/release-group/${mbid}/front-250` : '';

    const html = `
        <div class="popup-header">${locationLookup[d[2]] || 'Unknown Location'}</div>
        <div class="popup-body">
            <div class="popup-info">
                <div class="popup-artist">${d[0]}</div>
                <div class="popup-release">${d[1]}</div>
                <div class="popup-year">${d[4]}</div>
                <div class="genre-container">
                    ${genreListHTML}
                </div>
            </div>
            <div class="popup-right-col">
                <div class="popup-art-container">
                    ${mbid ? `
                        <div class="spinner" id="art-spinner"></div>
                        <img class="popup-art" src="${artUrl}" 
                             onload="document.getElementById('art-spinner').style.display='none'; this.style.display='block';"
                             onerror="this.style.display='none'; document.getElementById('art-spinner').style.display='none'; document.getElementById('no-art').style.display='block';">
                        <div id="no-art" class="no-art-text" style="display:none;">No Cover Art Found</div>
                    ` : `<div class="no-art-text">No Cover Art Found</div>`}
                </div>
            </div>
        </div>
        <div class="popup-footer">
            <a href="https://musicbrainz.org/release-group/${mbid}" target="_blank" class="mb-link">MUSICBRAINZ ↗</a>
            ${popupFeatures.length > 1 ? `<div>
                <button onclick="changePopup(-1)" class="nav-btn">◀</button>
                <span style="font-size:10px; margin:0 5px;">${currentPopupIndex+1}/${popupFeatures.length}</span>
                <button onclick="changePopup(1)" class="nav-btn">▶</button>
            </div>` : ''}
        </div>
    `;

    activePopup = new maplibregl.Popup({ maxWidth: 'none', closeButton: false }).setLngLat(lngLat).setHTML(html).addTo(map);
}

window.changePopup = (dir) => {
    currentPopupIndex = (currentPopupIndex + dir + popupFeatures.length) % popupFeatures.length;
    showPopup(activePopup.getLngLat());
};

function updateFilters() {
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    const yearFilter = ['<=', ['get', 'release_year'], currentYear];
    let finalFilter = yearFilter;

    if (searchTerm) {
        let ids = Object.entries(genreDict).filter(([g]) => g.includes(searchTerm)).map(([_, id]) => id);
        if (ids.length) finalFilter = ['all', yearFilter, ['any', ...ids.map(id => ['in', `|${id}|`, ['get', 'genre_ids']])]];
        else finalFilter = ['==', ['get', 'release_year'], -1];
    }
    map.setFilter('music-layer', finalFilter);
    map.setFilter('music-heat', finalFilter);
    document.getElementById('year-display').innerText = currentYear;
    updateStats();
}

function updateStats() {
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    const spotlight = genreStats[searchTerm] || genreStats['#' + searchTerm];
    document.getElementById('pan-to-origin').style.display = spotlight ? 'block' : 'none';
    if (spotlight) {
        document.getElementById('stats-title').innerText = `${searchTerm.toUpperCase()} ORIGIN`;
        document.getElementById('stat-first-year').innerText = spotlight.first_year;
    }
}

function initControls() {
    document.getElementById('year-slider').addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateFilters();
    });

    document.getElementById('genre-search').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(updateFilters, 300);
    });

    document.getElementById('cumulative-toggle').addEventListener('change', updateFilters);
    
    document.getElementById('play-btn').addEventListener('click', function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "⏸ Pause Timeline" : "▶ Play Timeline";
        if (isPlaying) animate();
    });

    document.getElementById('btn-points').onclick = () => {
        map.setLayoutProperty('music-layer', 'visibility', 'visible');
        map.setLayoutProperty('music-heat', 'visibility', 'none');
        document.getElementById('btn-points').classList.add('active');
        document.getElementById('btn-heatmap').classList.remove('active');
    };

    document.getElementById('btn-heatmap').onclick = () => {
        map.setLayoutProperty('music-layer', 'visibility', 'none');
        map.setLayoutProperty('music-heat', 'visibility', 'visible');
        document.getElementById('btn-heatmap').classList.add('active');
        document.getElementById('btn-points').classList.remove('active');
    };
}

function toggleLayer(isHeat) {
    map.setLayoutProperty('music-layer', 'visibility', isHeat ? 'none' : 'visible');
    map.setLayoutProperty('music-heat', 'visibility', isHeat ? 'visible' : 'none');
    document.getElementById('btn-points').classList.toggle('active', !isHeat);
    document.getElementById('btn-heatmap').classList.toggle('active', isHeat);
}

function animate() {
    if (!isPlaying) return;
    currentYear++;
    if (currentYear > 2025) {
        const s = document.getElementById('genre-search').value.toLowerCase();
        const spotlight = genreStats[s] || genreStats['#' + s];
        currentYear = spotlight ? spotlight.first_year : 1890;
    }
    document.getElementById('year-slider').value = currentYear;
    updateFilters();
    setTimeout(animate, parseInt(document.getElementById('speed-slider').value));
}
</script>
</body>
</html>
