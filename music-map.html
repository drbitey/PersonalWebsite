<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre Diffusion Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
    <link rel="stylesheet" href="music-map/style.css">
</head>
<body>
    <div id="loader-screen">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">Loading...</div>
        </div>
    </div>

    <div id="map"></div>

    <div id="mobile-hud" class="mobile-only">
        <button class="hud-btn" onclick="togglePanel('search')">🔍</button>
        <button class="hud-btn" onclick="togglePanel('filters')">⚙️</button>
        <button class="hud-btn" onclick="togglePanel('stats')">📊</button>
    </div>

    <div id="mobile-timeline-container" class="mobile-only">
        <button id="mobile-play-btn" class="mobile-play-btn">▶</button>
        <div class="mobile-timeline-controls">
            <div class="mobile-year-display" id="mobile-year-val">1970</div>
            <input type="range" id="mobile-timeline" min="1890" max="2025" value="1970">
        </div>
    </div>

    <div class="ui-panel" id="main-ui-panel">
        <div id="mobile-close-btn" class="mobile-only" onclick="closePanel()" style="position: absolute; right: 15px; top: 15px; font-size: 18px; color: #888; cursor: pointer; z-index: 10;">✕</div>

        <div id="desktop-timeline-group">
            <div id="year-display">1970</div>
            <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
        </div>
        
        <div class="controls">
            <div id="panel-search" class="panel-section">
                <div style="position: relative;">
                    <input type="text" id="artist-search" placeholder="Search Artist (e.g. Chat Pile)..." style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);">
                    <div id="artist-results" style="display:none;"></div>
                </div>
                <input type="text" id="genre-search" placeholder="Search Genre..." style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; width: calc(100% - 26px);">
            </div>

            <div id="panel-settings" class="panel-section">
                <button id="play-btn">▶ Play Timeline</button>
                <div class="toggle-group" style="display: flex; gap: 4px; background: #1a1a1a; padding: 4px; border-radius: 8px;">
                    <button id="btn-points" class="active" style="flex:1;">Points</button>
                    <button id="btn-heatmap" style="flex:1;">Heatmap</button>
                </div>
                <button id="reset-btn" style="margin-top: 5px; background: rgba(255, 50, 50, 0.1); border-color: #422;">↺ Reset All</button>
                
                <div class="advanced-toggle" id="adv-toggle">Advanced Settings ▾</div>
                <div class="advanced-content" id="adv-content" style="display: none; flex-direction: column; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333;">

                    <div style="font-size: 12px; color: #aaa;">Playback Speed</div>
                    <input type="range" id="speed-slider" class="slider" min="100" max="950" value="700">

                    <div style="font-size: 12px; color: #aaa; margin-top: 5px;">Heatmap Radius</div>
                    <input type="range" id="heat-radius-slider" class="slider" min="5" max="50" value="20">
    
                    <div style="font-size: 12px; color: #aaa;">Heatmap Intensity</div>
                    <input type="range" id="heat-intensity-slider" class="slider" min="0.01" max="2.51" step="0.05" value="0.51">
    
                    <select id="heat-color-select" style="background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; width: 100%;">
                        <option value="teal">Teal (Default)</option>
                        <option value="inferno">Inferno</option>
                        <option value="magma">Magma</option>
                        <option value="glacier">Glacier</option>
                    </select>

                    <div style="margin-top: 5px; padding-top: 5px; border-top: 1px solid #333;">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                            <label style="font-size:11px; color:#bbb;">
                                <input type="checkbox" id="cumulative-toggle" checked> Cumulative
                            </label>
                            <button id="range-mode-btn" style="padding: 2px 8px; font-size: 10px; display: none; background: #1a1a1a;">± Range</button>
                        </div>

                        <div id="buffer-label-container" style="display: none;">
                            <div style="font-size: 10px; color: #888;">Year Buffer: <span id="buffer-prefix">±</span><span id="buffer-display">0</span> years</div>
                            <input type="range" id="buffer-slider" min="0" max="25" value="0" class="slider">
                        </div>
                    </div>

                    <label style="font-size:11px; color:#bbb;"><input type="checkbox" id="loop-toggle" checked> Auto-Repeat</label>
                </div>
            </div>

            <div id="panel-stats" class="panel-section">
                <div class="stats-panel">
                    <div class="stats-title" id="stats-title">Global Stats</div>
                    <div class="stat-row"><span>Records:</span> <span id="stat-total" class="stat-val">0</span></div>
                    <div class="stat-row"><span>First Year:</span> <span id="stat-first-year" class="stat-val">-</span></div>
                    <button id="pan-to-origin" style="margin-top:10px; width:100%; padding:6px; font-size:10px; background:transparent; border:1px dashed #444; color:#00ffcc; display:none;">⌖ Pan to Origin</button>
                </div>
                <div id="debug-log" style="font-size:10px; color:#444; margin-top:10px;">Status: Ready</div>
            </div>
        </div>
    </div>

    <div class="mobile-attribution mobile-only">Data by MusicBrainz</div>
    <script src="music-map/music-map.js" defer></script>
</body>
</html>
