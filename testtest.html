<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Genre Diffusion Explorer</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #0f0f12; transition: opacity 0.2s; }
        
        .map-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 25, 0.95);
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 1;
        }

        h2 { margin-top: 0; margin-bottom: 10px; font-size: 1.2em; }
        input[type=range] { width: 100%; cursor: pointer; margin-top: 10px; }
        input[type=text] { width: 100%; padding: 8px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 10px; }
        
        #genre-info { 
            font-size: 13px; 
            background: rgba(255,255,255,0.08); 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            display: none; 
            line-height: 1.6;
        }
        .stat-label { color: #aaa; font-size: 11px; text-transform: uppercase; }
        .stat-val { color: #df65b0; font-weight: bold; }
        
        .control-group { margin-bottom: 10px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        
        .btn-main {
            width: 100%;
            background: #df65b0;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-main:hover { background: #f7fcfd; color: #df65b0; }

        .geo-link {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            padding: 3px 6px;
            margin-top: 4px;
            margin-right: 4px;
        }

        .music-popup { color: #222; min-width: 150px; }
        .music-popup h3 { margin: 0 0 5px 0; font-size: 14px; color: #df65b0; }
        .music-popup p { margin: 2px 0; font-size: 12px; }

        .credit { font-size: 10px; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="map-overlay">
    <h2>Music Diffusion</h2>
    
    <input id="genre-search" type="text" placeholder="Search genre (e.g. salsa, techno)...">

    <div id="genre-info">
        <div><span class="stat-label">First Recorded:</span> <span id="stat-year" class="stat-val">-</span></div>
        <div><span class="stat-label">Total Records:</span> <span id="stat-count" class="stat-val">-</span></div>
        <div style="margin-top:8px;">
            <button id="btn-origin" class="geo-link">📍 Origin</button>
            <button id="btn-hub" class="geo-link">🔥 Hub</button>
        </div>
    </div>

    <button id="play-btn" class="btn-main">▶ Play Diffusion Animation</button>

    <div class="control-group">
        <input type="checkbox" id="cumulative-check" checked>
        <label for="cumulative-check">Cumulative Display</label>
    </div>

    <label>Year: <span id="year-label">1980</span></label>
    <input id="slider" type="range" min="1890" max="2025" step="1" value="1980">
    
    <div class="credit">Data: MusicBrainz (CC BY-NC-SA 3.0)</div>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [0, 20],
        zoom: 2
    });

    let genreDict = {}; // Loaded from JSON
    let currentDecade = null;
    let activeGenreId = null;
    let activeGenreName = "";
    let searchTimeout;
    let genreStats = {}; 
    let isAnimating = false;
    let animationInterval = null;

    // 1. Load the Dictionary and Stats on startup
    Promise.all([
        fetch('genre_dictionary.json').then(r => r.json()),
        fetch('genre_stats.json').then(r => r.json())
    ]).then(([dict, stats]) => {
        genreDict = dict;
        genreStats = stats;
        console.log("🧠 Knowledge base ready.");
    });

    function updateMapFilters() {
        if (!map.getLayer('music-heat')) return;

        const year = parseInt(document.getElementById('slider').value);
        const isCumulative = document.getElementById('cumulative-check').checked;
        const operator = isCumulative ? '<=' : '==';
        
        let filters = ['all', [operator, ['get', 'release_year'], year]];

        if (activeGenreId) {
            // Search for the pipe-wrapped ID, e.g., "|12|"
            const searchString = `|${activeGenreId}|`;
            filters.push(['in', searchString, ['get', 'genre_ids']]);
            updateGenreUI(activeGenreName);
        } else {
            document.getElementById('genre-info').style.display = 'none';
        }

        map.setFilter('music-heat', filters);
        map.setFilter('music-dots', filters); // Filter the interactive dots too
    }

    function loadDecadeData(decade) {
        const filePath = `data_chunks/music_${decade}s.csv`;
        document.getElementById('map').style.opacity = '0.7';

        Papa.parse(filePath, {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: function(results) {
                // Map features and include the row INDEX as the feature ID
                const features = results.data.filter(row => row.lat && row.lon).map((row, index) => ({
                    'type': 'Feature',
                    'id': index, // VITAL: used to look up metadata in the sidecar
                    'geometry': { 'type': 'Point', 'coordinates': [row.lon, row.lat] },
                    'properties': { ...row }
                }));

                const geojsonData = { 'type': 'FeatureCollection', 'features': features };

                if (map.getSource('music-data')) {
                    map.getSource('music-data').setData(geojsonData);
                } else {
                    map.addSource('music-data', { 'type': 'geojson', 'data': geojsonData });
                    addHeatmapLayer();
                    addClickLayer(); // Transparent layer for clicking
                }
                
                updateMapFilters();
                document.getElementById('map').style.opacity = '1';
            }
        });
    }

    function addHeatmapLayer() {
        map.addLayer({
            'id': 'music-heat', 'type': 'heatmap', 'source': 'music-data',
            'paint': {
                'heatmap-weight': 0.15, 'heatmap-intensity': 3,
                'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 0, 2, 9, 15],
                'heatmap-color': ['interpolate', ['linear'], ['heatmap-density'], 0, 'rgba(0,0,0,0)', 0.2, '#4d004b', 0.4, '#810f7c', 0.6, '#ba478f', 0.8, '#df65b0', 1, '#f7fcfd']
            }
        });
    }

    function addClickLayer() {
        // Invisible circles that act as click targets for popups
        map.addLayer({
            'id': 'music-dots', 'type': 'circle', 'source': 'music-data',
            'paint': {
                'circle-radius': 5,
                'circle-color': '#df65b0',
                'circle-opacity': ['interpolate', ['linear'], ['zoom'], 3, 0, 6, 0.4] // Fades in as you zoom
            }
        });

        // Click Handler for Metadata Sidecar
        map.on('click', 'music-dots', (e) => {
            const featureId = e.features[0].id;
            const decade = Math.floor(parseInt(document.getElementById('slider').value) / 10) * 10;
            const metaPath = `data_chunks/meta_${decade}s.csv`;

            // Efficiently fetch just the metadata for this decade
            Papa.parse(metaPath, {
                download: true, header: true,
                complete: function(results) {
                    const data = results.data[featureId];
                    if (data) {
                        new maplibregl.Popup()
                            .setLngLat(e.lngLat)
                            .setHTML(`
                                <div class="music-popup">
                                    <h3>${data.release_name}</h3>
                                    <p><strong>Artist:</strong> ${data.artist_name}</p>
                                    <p><strong>Year:</strong> ${data.release_year}</p>
                                    <p><strong>Genres:</strong> ${data.release_genres.split(';').join(', ')}</p>
                                    <a href="https://musicbrainz.org/release/${data.release_mbid}" target="_blank" style="font-size:10px; color:#df65b0;">MusicBrainz Link</a>
                                </div>
                            `)
                            .addTo(map);
                    }
                }
            });
        });

        map.on('mouseenter', 'music-dots', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'music-dots', () => map.getCanvas().style.cursor = '');
    }

    function updateFromSlider() {
        const year = parseInt(document.getElementById('slider').value);
        const decade = Math.floor(year / 10) * 10;
        document.getElementById('year-label').textContent = year;

        if (decade !== currentDecade) {
            currentDecade = decade;
            loadDecadeData(decade);
        } else {
            updateMapFilters();
        }
    }

    function updateGenreUI(name) {
        const infoBox = document.getElementById('genre-info');
        const stats = genreStats[name];
        if (stats) {
            infoBox.style.display = 'block';
            document.getElementById('stat-year').textContent = stats.first_year;
            document.getElementById('stat-count').textContent = stats.total_count.toLocaleString();
            document.getElementById('btn-origin').onclick = () => map.flyTo({ center: stats.origin, zoom: 6 });
            document.getElementById('btn-hub').onclick = () => map.flyTo({ center: stats.hotspot, zoom: 5 });
        }
    }

    function toggleAnimation() {
        const playBtn = document.getElementById('play-btn');
        if (isAnimating) {
            clearInterval(animationInterval);
            playBtn.textContent = "▶ Play Diffusion Animation";
            isAnimating = false;
        } else {
            isAnimating = true;
            playBtn.textContent = "⏸ Pause Animation";
            animationInterval = setInterval(() => {
                let slider = document.getElementById('slider');
                let currentYear = parseInt(slider.value);
                if (currentYear < 2025) {
                    slider.value = currentYear + 1;
                    updateFromSlider();
                } else {
                    toggleAnimation();
                }
            }, 400);
        }
    }

    map.on('load', () => {
        currentDecade = 1980;
        loadDecadeData(currentDecade);
        
        document.getElementById('slider').addEventListener('input', updateFromSlider);
        document.getElementById('play-btn').addEventListener('click', toggleAnimation);
        document.getElementById('cumulative-check').addEventListener('change', updateMapFilters);

        document.getElementById('genre-search').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const val = e.target.value.trim().toLowerCase();
                activeGenreName = val;
                activeGenreId = genreDict[val] || null; // Look up ID from dictionary
                updateMapFilters();
            }, 300);
        });
    });
</script>
</body>
</html>
