<div id="map"></div>
<div class="ui-panel">
    <h2>Music History</h2>
    <div id="year-display">1970</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
    
    <div class="controls">
        <input type="text" id="genre-search" placeholder="Search Genre (Wait 300ms)...">
        
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <label><input type="checkbox" id="cumulative-toggle" checked> Cumulative</label>
            <div style="font-size: 11px; color: #888;">
                Speed: <input type="range" id="speed-slider" min="20" max="500" value="200" style="width: 60px; vertical-align: middle;" dir="rtl">
            </div>
        </div>

        <button id="play-btn">▶ Play Timeline</button>
        <div id="debug-log">Status: Initializing...</div>
    </div>
</div>

<script>
let currentYear = 1970; // Set to 1970 by default
let isPlaying = false;
let genreDict = {}; 
let musicMetadata = {}; 
let searchTimeout; // For the debouncer

// For the multi-point popup
let popupFeatures = [];
let currentPopupIndex = 0;
let activePopup = null;

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const PMTILES_URL = "https://www.mvoltz.com/music-map/data/music_data.pmtiles"; 
const DICT_URL = "https://www.mvoltz.com/music-map/data/genre_dictionary.json";
const META_URL = "https://www.mvoltz.com/music-map/data/metadata_lookup.json";

async function loadAssets() {
    try {
        logStatus("Loading assets...");
        const [dictRes, metaRes] = await Promise.all([fetch(DICT_URL), fetch(META_URL)]);
        genreDict = await dictRes.json();
        musicMetadata = await metaRes.json();
        logStatus("Assets loaded. Ready.");
    } catch (err) {
        logStatus("Error loading assets.");
    }
}

const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [0, 20], 
    zoom: 2.5
});

map.on('load', async () => {
    await loadAssets();

    map.addSource('music-points', {
        type: 'vector',
        url: `pmtiles://${PMTILES_URL}`
    });

    map.addLayer({
        'id': 'music-layer',
        'type': 'circle',
        'source': 'music-points',
        'source-layer': 'music', 
        'paint': {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2.5, 10, 8],
            'circle-color': '#00ffcc',
            'circle-stroke-width': 1,
            'circle-stroke-color': '#fff',
            'circle-opacity': 0.8
        }
    });

    map.on('mouseenter', 'music-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'music-layer', () => { map.getCanvas().style.cursor = ''; });

    // --- MULTI-FEATURE POPUP LOGIC ---
    map.on('click', 'music-layer', (e) => {
        // queryRenderedFeatures returns ALL points under the click
        popupFeatures = map.queryRenderedFeatures(e.point, { layers: ['music-layer'] });
        currentPopupIndex = 0;
        showPopup(e.lngLat);
    });

    initControls();
    updateFilters();
});

function showPopup(lngLat) {
    if (activePopup) activePopup.remove();
    if (!popupFeatures.length) return;

    const feat = popupFeatures[currentPopupIndex];
    const details = musicMetadata[feat.properties.mu_id];
    
    let navHTML = '';
    if (popupFeatures.length > 1) {
        navHTML = `
            <div style="margin-top:10px; padding-top:10px; border-top:1px solid #444; display:flex; justify-content:space-between; align-items:center;">
                <button onclick="changePopup(-1)" style="padding:2px 8px; font-size:10px;">←</button>
                <span style="font-size:10px; color:#aaa;">${currentPopupIndex + 1} of ${popupFeatures.length}</span>
                <button onclick="changePopup(1)" style="padding:2px 8px; font-size:10px;">→</button>
            </div>
        `;
    }

    const html = `
        <div class="popup-artist">${details ? details.a : 'Unknown'}</div>
        <div class="popup-release">${details ? details.r : 'Unknown'}</div>
        <div class="popup-year">Year: ${feat.properties.release_year}</div>
        ${navHTML}
    `;

    activePopup = new maplibregl.Popup()
        .setLngLat(lngLat)
        .setHTML(html)
        .addTo(map);
}

// Global function so the button clicks can find it
window.changePopup = (dir) => {
    currentPopupIndex += dir;
    if (currentPopupIndex < 0) currentPopupIndex = popupFeatures.length - 1;
    if (currentPopupIndex >= popupFeatures.length) currentPopupIndex = 0;
    showPopup(activePopup.getLngLat());
};

function updateFilters() {
    if (!map.getLayer('music-layer')) return;

    const isCumulative = document.getElementById('cumulative-toggle').checked;
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    
    const yearFilter = isCumulative 
        ? ['<=', ['get', 'release_year'], currentYear] 
        : ['==', ['get', 'release_year'], currentYear];

    let finalFilter = yearFilter; 

    if (searchTerm && Object.keys(genreDict).length > 0) {
        let matchingIds = [];
        for (const [genre, id] of Object.entries(genreDict)) {
            if (genre.includes(searchTerm)) matchingIds.push(id);
        }
        if (matchingIds.length > 0) {
            let genreConditions = matchingIds.map(id => ['in', `|${id}|`, ['get', 'genre_ids']]);
            finalFilter = ['all', yearFilter, ['any', ...genreConditions]];
        } else {
            finalFilter = ['==', ['get', 'release_year'], -1]; 
        }
    }

    map.setFilter('music-layer', finalFilter);
    document.getElementById('year-display').innerText = currentYear;
}

function initControls() {
    document.getElementById('year-slider').addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateFilters();
    });

    // --- DEBOUNCED SEARCH ---
    document.getElementById('genre-search').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            updateFilters();
        }, 300); // 300ms delay
    });

    document.getElementById('cumulative-toggle').addEventListener('change', updateFilters);
    
    document.getElementById('play-btn').addEventListener('click', function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "Pause" : "Play Timeline";
        if (isPlaying) animate();
    });
}

function animate() {
    if (!isPlaying) return;
    currentYear++;
    if (currentYear > 2025) currentYear = 1890;
    document.getElementById('year-slider').value = currentYear;
    updateFilters();
    
    // Get speed from slider (inverted so right is faster)
    const speed = parseInt(document.getElementById('speed-slider').value);
    setTimeout(animate, speed);
}

function logStatus(msg) {
    document.getElementById('debug-log').innerText = `Status: ${msg}`;
}
</script>
