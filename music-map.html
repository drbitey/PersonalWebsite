<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Music History Mapper</title>

    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* UI Panel Styling */
        .ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1;
            background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 8px;
            width: 320px; border: 1px solid #444; backdrop-filter: blur(5px);
        }
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; }
        input[type="text"], button { 
            background: #222; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 4px; 
        }
        button { cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #333; border-color: #00ffcc; }
        
        #year-display { font-size: 28px; font-weight: bold; color: #00ffcc; margin-bottom: 5px; }
        .slider { width: 100%; accent-color: #00ffcc; cursor: pointer; }
        #debug-log { font-size: 10px; color: #888; margin-top: 10px; font-family: monospace; }

        /* Dark Theme Pop-ups */
        .maplibregl-popup-content {
            background: #222; color: #fff; border: 1px solid #444;
            border-radius: 6px; padding: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.7);
        }
        .maplibregl-popup-tip { border-top-color: #222 !important; border-bottom-color: #222 !important; }
        
        .popup-location { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #888; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .popup-artist { font-size: 18px; font-weight: 900; color: #00ffcc; line-height: 1.1; margin-bottom: 4px; }
        .popup-release { font-size: 14px; font-style: italic; color: #fff; margin-bottom: 4px; }
        .popup-genres { font-size: 11px; color: #aaa; margin-bottom: 8px; line-height: 1.3; }
        .popup-year { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 10px; }

        /* MusicBrainz Link Style */
        .mb-link {
            display: inline-block;
            margin-top: 5px;
            color: #00ffcc;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #444;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .mb-link:hover {
            background: #00ffcc;
            color: #111;
            border-color: #00ffcc;
        }
        
        /* Multi-point Nav buttons */
        .popup-nav {
            margin-top: 12px; padding-top: 10px; border-top: 1px solid #444;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-btn {
            background: #333; color: white; border: 1px solid #555;
            padding: 2px 10px; border-radius: 3px; font-size: 12px; cursor: pointer;
        }
        .nav-btn:hover { background: #444; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div id="year-display">1970</div>
    <input type="range" id="year-slider" class="slider" min="1890" max="2025" value="1970">
    
    <div class="controls">
        <input type="text" id="genre-search" placeholder="Filter by Genre (e.g. Jazz, Afro)...">
        
        <div style="display:flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <label style="cursor:pointer;"><input type="checkbox" id="cumulative-toggle" checked> Cumulative</label>
            <div style="color: #888;">
                Fast <input type="range" id="speed-slider" min="30" max="600" value="200" style="width: 70px; vertical-align: middle;" dir="rtl"> Slow
            </div>
        </div>

        <button id="play-btn">▶ Play Timeline</button>
        <div id="debug-log">Status: Initializing Assets...</div>
    </div>
</div>

<script>
/** * CONFIGURATION */
let currentYear = 1970; 
let isPlaying = false;
let genreDict = {}; 
let musicMetadata = {}; 
let mbidLookup = null; // Lazy-loaded later
let searchTimeout;

// Multi-point popup state
let popupFeatures = [];
let currentPopupIndex = 0;
let activePopup = null;

/** * PMTILES SETUP */
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const PMTILES_URL = "https://www.mvoltz.com/music-map/data/music_data.pmtiles"; 
const DICT_URL = "https://www.mvoltz.com/music-map/data/genre_dictionary.json";
const META_URL = "https://www.mvoltz.com/music-map/data/metadata_lookup.json";
const MBID_URL = "https://www.mvoltz.com/music-map/data/mbid_lookup.json";

async function loadAssets() {
    try {
        logStatus("Fetching Dictionary & Metadata...");
        const [dictRes, metaRes] = await Promise.all([
            fetch(DICT_URL),
            fetch(META_URL)
        ]);
        genreDict = await dictRes.json();
        musicMetadata = await metaRes.json();
        logStatus("Ready.");
    } catch (err) {
        logStatus("Error loading data. Check paths.");
        console.error(err);
    }
}

/** * MAP INITIALIZATION */
const map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [17, 10], 
    zoom: 2.5
});

map.on('load', async () => {
    await loadAssets();

    map.addSource('music-points', {
        type: 'vector',
        url: `pmtiles://${PMTILES_URL}`
    });

    map.addLayer({
        'id': 'music-layer',
        'type': 'circle',
        'source': 'music-points',
        'source-layer': 'music', 
        'paint': {
            'circle-radius': ['interpolate', ['linear'], ['zoom'], 2, 2.5, 10, 9],
            'circle-color': '#00ffcc',
            'circle-stroke-width': 1,
            'circle-stroke-color': '#fff',
            'circle-opacity': 0.75
        }
    });

    map.on('mouseenter', 'music-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'music-layer', () => { map.getCanvas().style.cursor = ''; });

    map.on('click', 'music-layer', (e) => {
        popupFeatures = map.queryRenderedFeatures(e.point, { layers: ['music-layer'] });
        currentPopupIndex = 0;
        if (popupFeatures.length > 0) {
            showPopup(e.lngLat);
        }
    });

    initControls();
    updateFilters();
});

/** * POPUP SYSTEM */
async function showPopup(lngLat) {
    if (activePopup) activePopup.remove();
    if (popupFeatures.length === 0) return;

    const feat = popupFeatures[currentPopupIndex];
    const muId = feat.properties.mu_id;
    const details = musicMetadata[muId];
    
    // Lazy-load MBID lookup if it hasn't been fetched yet
    if (!mbidLookup) {
        logStatus("Loading MBID records...");
        try {
            const res = await fetch(MBID_URL);
            mbidLookup = await res.json();
            logStatus("Ready.");
        } catch (e) {
            console.error("Failed to load MBIDs", e);
        }
    }

    // Build the MusicBrainz link if ID exists
    const mbid = mbidLookup ? mbidLookup[muId] : null;
    const mbHTML = mbid 
        ? `<a href="https://musicbrainz.org/release/${mbid}" target="_blank" class="mb-link">↗ MusicBrainz</a>`
        : '';
    
    let navHTML = '';
    if (popupFeatures.length > 1) {
        navHTML = `
            <div class="popup-nav">
                <button class="nav-btn" onclick="changePopup(-1)"> < </button>
                <span style="font-size:10px; color:#666; font-family: monospace;">
                    ${currentPopupIndex + 1} / ${popupFeatures.length}
                </span>
                <button class="nav-btn" onclick="changePopup(1)"> > </button>
            </div>
        `;
    }

    const html = `
        <div class="popup-location">${details ? details.l : 'Unknown Location'}</div>
        <div class="popup-artist">${details ? details.a : 'Unknown Artist'}</div>
        <div class="popup-release">${details ? details.r : 'Unknown Release'}</div>
        <div class="popup-genres">Tagged: ${details ? details.g : 'None'}</div>
        <div class="popup-year">${feat.properties.release_year}</div>
        ${mbHTML}
        ${navHTML}
    `;

    activePopup = new maplibregl.Popup({ maxWidth: '260px', focusAfterOpen: false })
        .setLngLat(lngLat)
        .setHTML(html)
        .addTo(map);
}

window.changePopup = (direction) => {
    currentPopupIndex += direction;
    if (currentPopupIndex < 0) currentPopupIndex = popupFeatures.length - 1;
    if (currentPopupIndex >= popupFeatures.length) currentPopupIndex = 0;
    showPopup(activePopup.getLngLat());
};

/** * FILTERING LOGIC */
function updateFilters() {
    if (!map.getLayer('music-layer')) return;

    const isCumulative = document.getElementById('cumulative-toggle').checked;
    const searchTerm = document.getElementById('genre-search').value.trim().toLowerCase();
    
    const yearFilter = isCumulative 
        ? ['<=', ['get', 'release_year'], currentYear] 
        : ['==', ['get', 'release_year'], currentYear];

    let finalFilter = yearFilter; 

    if (searchTerm && Object.keys(genreDict).length > 0) {
        let matchingIds = [];
        for (const [genre, id] of Object.entries(genreDict)) {
            if (genre.includes(searchTerm)) matchingIds.push(id);
        }

        if (matchingIds.length > 0) {
            let genreConditions = matchingIds.map(id => ['in', `|${id}|`, ['get', 'genre_ids']]);
            finalFilter = ['all', yearFilter, ['any', ...genreConditions]];
        } else {
            finalFilter = ['==', ['get', 'release_year'], -1]; 
        }
    }

    map.setFilter('music-layer', finalFilter);
    document.getElementById('year-display').innerText = currentYear;
}

/** * UI EVENT LISTENERS */
function initControls() {
    document.getElementById('year-slider').addEventListener('input', (e) => {
        currentYear = parseInt(e.target.value);
        updateFilters();
    });

    document.getElementById('genre-search').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            updateFilters();
        }, 300);
    });

    document.getElementById('cumulative-toggle').addEventListener('change', updateFilters);

    document.getElementById('play-btn').addEventListener('click', function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "⏸ Pause Timeline" : "▶ Play Timeline";
        if (isPlaying) animate();
    });
}

/** * ANIMATION ENGINE */
function animate() {
    if (!isPlaying) return;
    
    currentYear++;
    if (currentYear > 2025) currentYear = 1890;
    
    document.getElementById('year-slider').value = currentYear;
    updateFilters();
    
    const delay = parseInt(document.getElementById('speed-slider').value);
    setTimeout(animate, delay);
}

function logStatus(msg) {
    document.getElementById('debug-log').innerText = `Status: ${msg}`;
}
</script>
</body>
</html>
